services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proxyml
      POSTGRES_PASSWORD: proxyml
      POSTGRES_DB: proxyml
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxyml"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://proxyml:proxyml@db:5432/proxyml
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  frontend:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
